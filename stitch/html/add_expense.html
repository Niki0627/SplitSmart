<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 flex flex-col">
<header class="sticky top-0 z-10 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md px-4 py-3 flex items-center justify-between border-b border-slate-200 dark:border-primary/10">
<button class="p-2 -ml-2 hover:bg-slate-200 dark:hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">close</span>
</button>
<h1 class="text-base font-bold tracking-tight">Rapid Entry</h1>
<button class="p-2 -mr-2 hover:bg-slate-200 dark:hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-primary">history</span>
</button>
</header>
<main class="flex-1 overflow-y-auto px-4 py-4 space-y-5 max-w-md mx-auto w-full pb-24">
<section class="bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-2xl p-4 space-y-4 shadow-sm">
<div class="flex items-center justify-between gap-4">
<div class="flex-1">
<label class="block text-[10px] font-bold text-slate-400 dark:text-primary/60 uppercase tracking-widest mb-1">Total Amount</label>
<div class="flex items-center gap-1.5">
<span class="text-2xl font-bold text-primary">$</span>
<input autofocus="" class="bg-transparent border-none text-3xl font-bold focus:ring-0 w-full p-0 placeholder:text-slate-300 dark:placeholder:text-slate-700" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<div class="w-[1px] h-10 bg-slate-200 dark:bg-primary/20"></div>
<div class="flex-1">
<label class="block text-[10px] font-bold text-slate-400 dark:text-primary/60 uppercase tracking-widest mb-1">Paid by</label>
<select class="select-chevron w-full bg-transparent border-none p-0 text-base font-semibold text-slate-800 dark:text-slate-200 focus:ring-0 outline-none cursor-pointer">
<option value="me">You</option>
<option value="sarah">Sarah Johnson</option>
<option value="mike">Mike Chen</option>
<option value="emily">Emily Davis</option>
</select>
</div>
</div>
</section>
<section class="space-y-2.5">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Category</label>
<div class="grid grid-cols-4 gap-2">
<button class="flex flex-col items-center gap-1.5 p-2 rounded-xl border border-primary bg-primary/10 shadow-sm shadow-primary/5">
<span class="material-symbols-outlined text-primary text-xl">restaurant</span>
<span class="text-[10px] font-bold text-primary uppercase">Food</span>
</button>
<button class="flex flex-col items-center gap-1.5 p-2 rounded-xl border border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-primary/5 hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-xl">directions_car</span>
<span class="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase">Travel</span>
</button>
<button class="flex flex-col items-center gap-1.5 p-2 rounded-xl border border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-primary/5 hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-xl">movie</span>
<span class="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase">Movie</span>
</button>
<button class="flex flex-col items-center gap-1.5 p-2 rounded-xl border border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-primary/5 hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 text-xl">receipt_long</span>
<span class="text-[10px] font-semibold text-slate-500 dark:text-slate-400 uppercase">Bills</span>
</button>
</div>
</section>
<section class="grid grid-cols-2 gap-3">
<div class="space-y-2">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Description</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Dinner, etc." type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Date</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary text-lg pointer-events-none">calendar_today</span>
<input class="w-full bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl px-3 py-3 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary outline-none transition-all [color-scheme:dark]" type="date" value="2023-10-27"/>
</div>
</div>
</section>
<section class="space-y-2.5">
<div class="flex items-center justify-between ml-1">
<label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Split Type</label>
<span class="text-[10px] font-bold text-primary bg-primary/10 px-2 py-0.5 rounded-full uppercase tracking-tight">Equally</span>
</div>
<div class="grid grid-cols-3 gap-2">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-primary bg-primary text-background-dark font-bold text-xs shadow-md shadow-primary/20">
<span class="material-symbols-outlined text-base">balance</span>
                Equal
            </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-primary/5 text-slate-500 dark:text-slate-400 font-semibold text-xs hover:border-primary/30">
<span class="material-symbols-outlined text-base">format_list_numbered</span>
                Unequal
            </button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-slate-200 dark:border-primary/10 bg-slate-50 dark:bg-primary/5 text-slate-500 dark:text-slate-400 font-semibold text-xs hover:border-primary/30">
<span class="material-symbols-outlined text-base">percent</span>
                %
            </button>
</div>
</section>
<section class="flex items-center justify-between p-3 bg-slate-50 dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl">

<div class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-primary/20 ring-2 ring-white dark:ring-background-dark text-[10px] font-bold text-primary">+2</div>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Split with 4 friends</p>
</div>
<button class="text-xs font-bold text-primary">Edit</button>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-3.5 px-6 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/30 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined font-bold text-xl">check_circle</span>
<span class="tracking-tight">Save Expense</span>
</button>
</div>
</div>
