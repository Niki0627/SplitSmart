<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SplitSmart - Create Group</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#24d1c6",
                        "background-light": "#f6f8f8",
                        "background-dark": "#12201f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(36, 209, 198, 0.2);
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col items-center">
<div class="w-full max-w-md min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-2xl relative">
<!-- Header -->
<header class="flex items-center px-4 py-6 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold ml-4 tracking-tight">Create New Group</h1>
</header>
<main class="flex-1 px-4 pb-32">
<!-- Group Info Card -->
<section class="mb-8">
<div class="bg-white dark:bg-slate-800/50 p-6 rounded-xl border border-slate-200 dark:border-slate-700/50 shadow-sm">
<div class="flex items-center gap-6 mb-2">
<div class="relative group cursor-pointer">
<div class="size-20 rounded-xl bg-primary/10 border-2 border-dashed border-primary/40 flex flex-col items-center justify-center text-primary overflow-hidden">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
<span class="text-[10px] font-semibold mt-1">AVATAR</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-white size-6 rounded-full flex items-center justify-center border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
<div class="flex-1">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Group Name</label>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border-transparent focus:border-primary focus:ring-0 rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="e.g., Summer Trip 2024" type="text"/>
</div>
</div>
</div>
</section>
<!-- Selected Members Tray (Horizontal Scroll) -->
<section class="mb-6">
<h2 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-3 px-1">Selected Members (3)</h2>
<div class="flex gap-4 overflow-x-auto pb-2 no-scrollbar">
<div class="flex flex-col items-center shrink-0 w-16">
<div class="size-12 rounded-full bg-primary/20 border border-primary/50 flex items-center justify-center relative">
<span class="text-primary font-bold">JD</span>
<button class="absolute -top-1 -right-1 bg-red-500 text-white size-5 rounded-full flex items-center justify-center border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-[12px] font-bold">close</span>
</button>
</div>
<span class="text-[10px] mt-1 text-center truncate w-full">John D.</span>
</div>
<div class="flex flex-col items-center shrink-0 w-16">
<div class="size-12 rounded-full bg-amber-500/20 border border-amber-500/50 flex items-center justify-center relative">
<span class="text-amber-500 font-bold">SK</span>
<button class="absolute -top-1 -right-1 bg-red-500 text-white size-5 rounded-full flex items-center justify-center border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-[12px] font-bold">close</span>
</button>
</div>
<span class="text-[10px] mt-1 text-center truncate w-full">Sarah K.</span>
</div>
<div class="flex flex-col items-center shrink-0 w-16">
<div class="size-12 rounded-full bg-indigo-500/20 border border-indigo-500/50 flex items-center justify-center relative">
<span class="text-indigo-500 font-bold">ML</span>
<button class="absolute -top-1 -right-1 bg-red-500 text-white size-5 rounded-full flex items-center justify-center border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-[12px] font-bold">close</span>
</button>
</div>
<span class="text-[10px] mt-1 text-center truncate w-full">Marcus L.</span>
</div>
</div>
</section>
<!-- Search & Add Section -->
<section class="space-y-4">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 shadow-sm" placeholder="Search friends or usernames..." type="text"/>
</div>
<div class="bg-white dark:bg-slate-800/30 rounded-xl border border-slate-200 dark:border-slate-700/50 overflow-hidden">
<div class="p-4 border-b border-slate-200 dark:border-slate-700/50">
<h3 class="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Suggested Friends</h3>
</div>
<div class="divide-y divide-slate-100 dark:divide-slate-700/50 max-h-60 overflow-y-auto custom-scrollbar">
<!-- Suggested Item 1 -->
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-500 font-semibold">AM</div>
<div>
<p class="text-sm font-semibold">Alice Miller</p>
<p class="text-xs text-slate-500">@alice_m</p>
</div>
</div>
<button class="p-2 rounded-full text-primary bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">person_add</span>
</button>
</div>
<!-- Suggested Item 2 -->
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500 font-semibold">RP</div>
<div>
<p class="text-sm font-semibold">Robert Patterson</p>
<p class="text-xs text-slate-500">@robpatt</p>
</div>
</div>
<button class="p-2 rounded-full text-primary bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">person_add</span>
</button>
</div>
<!-- Suggested Item 3 -->
<div class="flex items-center justify-between p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-500 font-semibold">EW</div>
<div>
<p class="text-sm font-semibold">Emma Watson</p>
<p class="text-xs text-slate-500">@em_watson</p>
</div>
</div>
<button class="p-2 rounded-full text-primary bg-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">person_add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Invite by Email Card -->
<section class="mt-8">
<div class="bg-primary/5 dark:bg-primary/10 p-6 rounded-xl border border-primary/20 shadow-sm">
<h3 class="text-sm font-bold text-primary uppercase tracking-wider mb-3">Add by Phone Number</h3>
<div class="flex gap-2"><button class="bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 size-12 rounded-lg flex items-center justify-center border border-slate-200 dark:border-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"><span class="material-symbols-outlined">contact_page</span></button>
<input class="flex-1 bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700/50 focus:border-primary focus:ring-1 focus:ring-primary rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 shadow-sm" placeholder="Mobile number or name..." type="tel"/>
<button class="bg-primary text-slate-900 size-12 rounded-lg flex items-center justify-center shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined font-bold">add</span>
</button>
</div>
<p class="text-[11px] text-slate-500 dark:text-slate-400 mt-2 italic px-1">Select from contacts or enter a mobile number manually.</p>
</div>
</section>
</main>
<!-- Fixed Footer Action -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary text-slate-900 font-bold text-lg py-4 rounded-xl shadow-xl shadow-primary/20 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Create Group
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</footer>
</div>
</body></html>
